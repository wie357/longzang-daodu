=[{slug:"tantra",path:"/tantra",name:"秘密部",order:1,segLabel:"",hanLabel:"二十四函",icon:"Sparkles",core:"轉化",tagline:"以灌頂、本尊、真言、壇城及禪定,將凡夫身語意轉化為佛的身語意。",seoDescription:"《龍藏經》秘密部導讀:密續部的壇城、灌頂、真言、觀想與生起次第、圓滿次第,以及本尊、壇城、真言、灌頂等重要觀念的白話說明。",intro:"秘密部又可稱為密續部、密教部或續部。這部分主要不是一般人熟悉的佛陀說故事,而是藏傳佛教密法系統。其核心思想是:眾生的身、語、意雖受到煩惱遮蔽,但本質具有成佛的可能;透過灌頂、觀想、持咒、禪定及智慧修持,使凡夫的身語意逐步轉化為佛的身語意。",coreCards:[{title:"轉化",text:"眾生的身、語、意雖受煩惱遮蔽,本質具有成佛的可能;透過修持使凡夫身語意逐步轉化為佛的身語意。"},{title:"本尊與壇城",text:"本尊是修行者用來觀想佛菩薩智慧與功德的形象;壇城象徵佛的清淨世界,也象徵身心由混亂轉向清淨的過程。"},{title:"真言與灌頂",text:"真言被視為佛菩薩清淨語言的表現,須配合觀想、發心與禪定;灌頂是進入特定密續修行的重要儀式,一般須由具傳承資格的上師指導。"}],keyTerms:[{term:"本尊",def:"不是一般所說的神明,而是修行者用來觀想佛菩薩智慧與功德的形象;觀想自己與本尊相應,目的是去除對凡夫自我的執著。"},{term:"壇城",def:"象徵佛的清淨世界,也象徵人的身心由混亂轉向清淨、圓滿的過程。"},{term:"真言",def:"真言或咒語被視為佛菩薩清淨語言的表現;持誦時通常還要配合觀想、發心與禪定,並非單純反覆念誦。"},{term:"灌頂",def:"進入特定密續修行的重要儀式。許多密法原文即使能閱讀,也不代表可以自行照文字修持,一般須由具傳承資格的上師指導。"},{term:"生起次第與圓滿次第",def:"秘密部密法系統中的修持次第,屬於將身、語、意轉化為佛身、佛語、佛意的方法。"}],sections:[{id:"s1",num:"一",title:"秘密部:二十四函",body:`\u{300C}\u{79D8}\u{5BC6}\u{90E8}\u{300D}\u{53C8}\u{53EF}\u{7A31}\u{70BA}\u{5BC6}\u{7E8C}\u{90E8}\u{3001}\u{5BC6}\u{6559}\u{90E8}\u{6216}\u{7E8C}\u{90E8}\u{3002}

方法。"},{term:"般若波羅蜜多",division:"般若部",path:"/prajnaparamita",anchor:"s1",def:"「般若」是能看清人與萬事萬物都依因緣條件而存在、沒有固定獨立本體的智慧;「波羅蜜多」可理解為修行達到圓滿,或從煩惱執著的此岸到達自由解脫的彼岸。"},{term:"空性",division:"般若部",path:"/prajnaparamita",anchor:"s2",def:"一切事物都沒有獨立、固定、不依賴條件的「自性」;不是世界完全不存在,也不是善惡沒有差別、人可以不負責任。"},{term:"五蘊",division:"般若部",path:"/prajnaparamita",anchor:"s3",def:"色、受、想、行、識。「五蘊皆空」指身心五蘊都是因緣和合、剎那變化,沒有可以被認定為永恆自我的部分。"},{term:"十二處",division:"般若部",path:"/prajnaparamita",anchor:"s5",def:"六根(眼耳鼻舌身意)加六境(色聲香味觸法),稱為十二處。"},{term:"十八界",division:"般若部",path:"/prajnaparamita",anchor:"s5",def:"六根、六境、六識合稱十八界;感官、外境及認識都必須互相依賴才能產生,任何一項都不能完全獨立存在。"},{term:"十二因緣",division:"般若部",path:"/prajnaparamita",anchor:"s6",def:"無明、行、識、名色、六入、觸、受、愛、取、有、生、老死;十二個環節都不是命中注定,依條件產生,因此可以透過智慧與修行中斷。"},{term:"四聖諦",division:"般若部",path:"/prajnaparamita",anchor:"s7",def:"苦諦、集諦、滅諦、道諦;是引導眾生的教法,但它本身也依語言、對象與修行需要而建立,不能被執著成另一個固定實體。"},{term:"六度(六波羅蜜)",division:"般若部",path:"/prajnaparamita",anchor:"s8",def:"布施、持戒、忍辱、精進、禪定、般若;缺少般若時,其他善行容易伴隨自我炫耀、占有及執著。"},{term:"無所得",division:"般若部",path:"/prajnaparamita",anchor:"s10",def:"努力修行,卻不把成果變成新的自我執著;不把功德當成自我優越的證明,不將佛法變成抬高自己的工具。"},{term:"不住",division:"般若部",path:"/prajnaparamita",anchor:"s11",def:"《金剛經》思想:心不固定黏附於某個對象;有感情、有行動,但不被占有、控制和固定觀念綁住。"},{term:"無生",division:"般若部",path:"/prajnaparamita",anchor:"s13",def:"不是說現象從未出現,而是一切現象都沒有一個獨立自主的本體,能夠憑自己的力量從無到有。"},{term:"二諦",division:"般若部",path:"/prajnaparamita",anchor:"s21",def:"世俗諦與勝義諦;只講世俗而不理解空性,容易產生執著;只談空性而忽略世俗,則可能否定因果與責任。"},{term:"寶積",division:"寶積部",path:"/ratnakuta",anchor:"s1",def:"梵文 Ratnakūṭa;「寶」象徵珍貴教法,「積」代表許多不同經典匯集在一起。"},{term:"菩提心",division:"寶積部",path:"/ratnakuta",anchor:"s3",def:"為了幫助一切眾生真正離苦,發願成就圓滿佛果;包含願菩提心與行菩提心兩個層次。"},{term:"三律儀",division:"寶積部",path:"/ratnakuta",anchor:"s8",def:"菩薩戒的三個方向:攝律儀戒(停止惡行)、攝善法戒(主動培養善法)、饒益有情戒(實際幫助眾生)。"},{term:"善巧方便",division:"寶積部",path:"/ratnakuta",anchor:"s18",def:"佛依眾生的能力、問題和環境,以不同方式教導;必須真正理解眾生的問題,選擇既正確又適合對方的方法。"},{term:"授記",division:"寶積部",path:"/ratnakuta",anchor:"s19",def:"佛陀預言某位修行者將來會在特定佛國成佛;代表成佛的可能已被確認,但仍須圓滿漫長的菩薩行。"},{term:"如來藏",division:"寶積部",path:"/ratnakuta",anchor:"s16",def:"一切眾生都具有走向覺悟的可能,但被貪、瞋、癡等煩惱遮蔽;不能簡單理解為身體裡藏著一位小佛。"},{term:"一乘",division:"寶積部",path:"/ratnakuta",anchor:"s16",def:"聲聞、緣覺及菩薩等不同道路,最終都可被理解為導向佛的圓滿覺悟。"},{term:"魔障",division:"寶積部",path:"/ratnakuta",anchor:"s22",def:"不一定只是外在鬼神,也包括會破壞修行的內在狀態,例如驕傲、嫉妒、貪圖名聲、炫耀功德。"},{term:"法界",division:"華嚴部",path:"/avatamsaka",anchor:"s3",def:"一切現象共同存在、互相依存的真實境界;包含身心、人與自然、個人與社會、過去現在未來、佛菩薩與眾生。"},{term:"因陀羅網",division:"華嚴部",path:"/avatamsaka",anchor:"s5",def:"比喻法界關係的無限大網:每個交會點有一顆寶珠,每顆寶珠映照所有寶珠;一顆變化,其他映像也跟著變化。"},{term:"一即一切",division:"華嚴部",path:"/avatamsaka",anchor:"s4",def:"不是說所有事物完全相同,而是每件事物不能脫離其他條件獨立存在;一個局部可以反映整體,整體也透過每個局部展現。"},{term:"毘盧遮那佛",division:"華嚴部",path:"/avatamsaka",anchor:"s2",def:"可理解為大日、遍照、光明遍及一切;象徵佛的智慧與法身遍及一切法界。"},{term:"菩薩十地",division:"華嚴部",path:"/avatamsaka",anchor:"s8",def:"菩薩由初步覺悟走向圓滿佛果的十個階段:歡喜地、離垢地、發光地、焰慧地、難勝地、現前地、遠行地、不動地、善慧地、法雲地。"},{term:"善財童子五十三參",division:"華嚴部",path:"/avatamsaka",anchor:"s10",def:"善財童子為求菩薩道,依文殊菩薩指引參訪許多善知識;善知識不一定只以固定外表出現。"},{term:"普賢十大行願",division:"華嚴部",path:"/avatamsaka",anchor:"s12",def:"禮敬諸佛、稱讚如來、廣修供養、懺悔業障、隨喜功德、請轉法輪、請佛住世、常隨佛學、恆順眾生、普皆迴向。"},{term:"業力",division:"諸經部",path:"/sutra",anchor:"s13",def:"「業」是有意志的身體、語言與思想行為;行為形成習慣、習慣影響性格、性格影響選擇、選擇形成後果。業力不是命運已經完全寫好。"},{term:"六道",division:"諸經部",path:"/sutra",anchor:"s15",def:"天、阿修羅、人、畜生、餓鬼、地獄;外在處境與內心狀態會互相影響,人的心在一天之中也可能經歷類似不同六道的狀態。"},{term:"涅槃",division:"諸經部",path:"/sutra",anchor:"s9",def:"核心是貪、瞋、癡及無明徹底止息,不再受到輪迴痛苦支配;不能只理解成消失或虛無。"},{term:"佛性",division:"諸經部",path:"/sutra",anchor:"s10",def:"眾生的煩惱不是永遠不能改變,所有眾生都具有走向覺悟的可能;但不表示不需要修行或惡行不會有後果。"},{term:"三昧",division:"諸經部",path:"/sutra",anchor:"s11",def:"即禪定、等持;目的是使心穩定、清楚、不被貪瞋癡任意控制,進而如實觀察一切法。"},{term:"陀羅尼",division:"諸經部",path:"/sutra",anchor:"s20",def:"含有總持、記持、保持教法不忘、集中佛法要義、護持修行等意思。"},{term:"三性",division:"諸經部",path:"/sutra",anchor:"s7",def:"《解深密經》教法:遍計所執性、依他起性、圓成實性;看清依他而生的現象中,並不存在心所想像的固定自性。"},{term:"萬法唯心",division:"諸經部",path:"/sutra",anchor:"s8",def:"不能理解為「只要我想什麼,外界就會變成什麼」;較接近人所經驗的世界,總會受到感官、記憶、語言、情緒與心識習慣影響。"},{term:"一佛乘",division:"諸經部",path:"/sutra",anchor:"s4",def:"佛陀依眾生能力,暫時說聲聞、緣覺及菩薩等不同道路,但最終目的都是引導眾生成就佛的圓滿智慧。"},{term:"不二法門",division:"諸經部",path:"/sutra",anchor:"s6",def:"究竟真實超越語言建立的有與無、善與惡、自我與他人等固定二分;但在日常世俗中,仍然要辨別善惡及承擔責任。"},{term:"律(毘奈耶)",division:"律部",path:"/vinaya",anchor:"s1",def:"梵文 Vinaya,意為調伏、規範、訓練、對治煩惱、僧團生活制度。"},{term:"波羅提木叉",division:"律部",path:"/vinaya",anchor:"s6",def:"別解脫戒、逐條守護而獲得解脫,是僧人定期誦讀的戒條總集。"},{term:"波羅夷",division:"律部",path:"/vinaya",anchor:"s7",def:"意為「他勝」或根本失敗,是極嚴重的出家戒;犯下此類根本戒者,依傳統戒律將失去比丘資格。"},{term:"僧殘",division:"律部",path:"/vinaya",anchor:"s8",def:"屬於嚴重過失,但一般仍有依僧團程序懺悔與恢復的可能。"},{term:"羯磨",division:"律部",path:"/vinaya",anchor:"s5",def:"僧團依法作成正式決定的程序;重要決定不能只靠某個人的喜好,而要依規則、通知、出席與共同決議辦理。"},{term:"布薩",division:"律部",path:"/vinaya",anchor:"s5",def:"僧團定期集合,誦戒並檢查修行情況;精神是團體需要定期自我檢查。"},{term:"安居",division:"律部",path:"/vinaya",anchor:"s5",def:"印度雨季期間僧人集中居住、減少旅行;具有避免傷害小生命、集中學習、穩定修行、加強僧團合作等作用。"},{term:"懺悔",division:"律部",path:"/vinaya",anchor:"s13",def:"不只是念誦儀文;應包含承認錯誤、不隱瞞事實、停止錯誤行為、接受合理後果、盡力補償、防止重犯。"}],Q=[{id:"relations",num:"一",title:"《龍藏經》六大部的完整關係",body:`### \u{79D8}\u{5BC6}\u{90E8}
